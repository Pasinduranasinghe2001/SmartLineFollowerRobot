; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
; Board     : ESP32 Dev Module (38-pin, WROOM-32)
; Framework : Arduino (Espressif esp32)
;
; ENVIRONMENTS
; ───────────────────────────────────────────────────────────────────────────
;
;  esp32dev    (default)
;    Full production firmware: main state machine, all subsystems.
;    Flash with: pio run --target upload
;    Test with:  pio test --environment esp32dev
;                └─ runs test/test_unity_smoke (Unity unit tests)
;
;  test_7ir
;    Standalone 7-IR line-follower test sketch.
;    Flash with: pio run --environment test_7ir --target upload
;    NOT a pio test target – it is a full firmware env, not a Unity suite.
;
; AUTO-RESET / UPLOAD FIX
; ───────────────────────────────────────────────────────────────────────────
;   upload_resetmethod = nodemcu   – NodeMCU RTS/DTR sequence
;   upload_speed       = 460800    – stable on CH340 clone boards
;   board_build.flash_mode = dio   – safest for WROOM-32
;
; DEBUG LOGGING
; ───────────────────────────────────────────────────────────────────────────
;   CORE_DEBUG_LEVEL:  0=NONE 1=ERROR 2=WARN 3=INFO 4=DEBUG 5=VERBOSE
;   Set to 0 before competition.
; =========================================================================

; ───────────────────────────────────────────────────────────────────────────
; SHARED SETTINGS  (inherited by all envs unless overridden)
; ───────────────────────────────────────────────────────────────────────────
[env]
platform              = espressif32
board                 = esp32dev
framework            = arduino
upload_resetmethod    = nodemcu
upload_speed          = 460800
board_build.flash_mode = dio
monitor_speed         = 115200
monitor_filters       =
    esp32_exception_decoder
    colorize
    time
    log2file
lib_deps =
    madhephaestus/ESP32Servo@^0.13.0
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DARDUINO_SERIAL_PORT=0
    -Wall
    -Wextra

; ───────────────────────────────────────────────────────────────────────────
; ENV 1 – Production firmware  (pio run / pio test)
; ───────────────────────────────────────────────────────────────────────────
[env:esp32dev]
; Uses src/ folder (default build_src_filter)
; Unity tests in test/test_unity_smoke/ run via: pio test --environment esp32dev
test_framework = unity
test_filter    = test_unity_smoke   ; only run the smoke test suite

; ───────────────────────────────────────────────────────────────────────────
; ENV 2 – 7-IR test firmware  (pio run --environment test_7ir --target upload)
; ───────────────────────────────────────────────────────────────────────────
[env:test_7ir]
; Compiles ONLY the 7-IR standalone sketch – no src/ files included.
; This is a firmware env (not a pio test env).
; Flash: pio run --environment test_7ir --target upload
build_src_filter = -<*> +<../test/test_7ir_sketch/>

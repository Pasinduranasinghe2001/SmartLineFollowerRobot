; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
; Board  : ESP32 DevKit (38-pin)
; =========================================================================
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    madhephaestus/ESP32Servo@^0.13.0

; ── Build flags ─────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0



; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
; Board  : ESP32 DevKitC v4  ── 30-PIN variant (WROOM-32)
; Framework: Arduino (Espressif esp32)
;
; BOARD NOTE
; ─────────────────────────────────────────────────────────────────────────
; The 30-pin ESP32 DevKit uses board = esp32doit-devkit-v1
; The 38-pin variant uses board = esp32dev
; Using the wrong board ID does NOT change the compiled code (both boards
; run the same ESP32-WROOM-32 chip) but it does affect:
;   • The pin diagram shown in PlatformIO IDE
;   • Upload/monitor auto-detection hints
;   • Flash size defaults (both are 4 MB on DevKit, so safe either way)
;
; 30-PIN vs 38-PIN physical differences:
;   38-pin adds: GPIO 7,8,9,10,11 (SPI flash – internally connected, NEVER
;   use as GPIO), GPIO 16,17 (exposed on extra rows), SVP/SVN (GPIO 36,39)
;   30-pin exposes: GPIO 0-5, 12-15, 18-19, 21-23, 25-27, 32-39
;   All pins used in config.h are present on the 30-pin board.
;
; DEBUG LOGGING GUIDE
; ─────────────────────────────────────────────────────────────────────────
;   0 = NONE    – silent  (use for competition / final deployment)
;   1 = ERROR   – fatal errors only
;   2 = WARN    – errors + warnings
;   3 = INFO    – boot messages, peripheral init
;   4 = DEBUG   – driver-level prints
;   5 = VERBOSE – everything (use during development)
;
; In code use structured log macros (respect the level filter):
;   static const char* TAG = "ROBOT";
;   ESP_LOGE(TAG, "Motor fault! spd=%d", spd);        // level ≥ 1
;   ESP_LOGW(TAG, "Recovery timeout %lu ms", dt);     // level ≥ 2
;   ESP_LOGI(TAG, "State → OBSTACLE_SLOW");           // level ≥ 3
;   ESP_LOGD(TAG, "PID err=%.2f corr=%.2f", e, c);   // level ≥ 4
;   ESP_LOGV(TAG, "raw=%d str=%d", r, s);             // level ≥ 5
; =========================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32doit-devkit-v1   ; ← 30-pin ESP32 DevKitC v4 / DoIt board
framework = arduino

; ── Serial monitor ──────────────────────────────────────────────────────
; Uncomment and set your machine's COM port:
;   Windows : upload_port = COM3
;   Linux   : upload_port = /dev/ttyUSB0
;   macOS   : upload_port = /dev/cu.usbserial-0001
; upload_port   = COM3
; monitor_port  = COM3
monitor_speed   = 115200
upload_speed    = 921600          ; faster flash writes

; Coloured + timestamped output in the PlatformIO serial monitor
monitor_filters =
    esp32_exception_decoder       ; auto-decodes crash backtraces → file:line
    colorize                      ; RED=error  YELLOW=warn  GREEN=info
    time                          ; prepends HH:MM:SS.mmm to every line
    log2file                      ; saves full session to .pio/monitor.log

; ── Library dependencies ───────────────────────────────────────────────
lib_deps =
    madhephaestus/ESP32Servo @ ^0.13.0

; ── Build flags ─────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=5          ; VERBOSE – full ESP32 system + driver logs
    -DDEBUG_ESP_PORT=Serial       ; route ESP-IDF logs to UART0 (Serial)
    -DARDUINO_SERIAL_PORT=0       ; confirm UART0
    -Wall                         ; all standard compiler warnings
    -Wextra                       ; extra: unused vars, missing returns, etc.

; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
; Board  : ESP32 DevKit (38-pin)
; Framework: Arduino (Espressif esp32)
;
; DEBUG LOGGING GUIDE
; ─────────────────────────────────────────────────────────────────────────
; CORE_DEBUG_LEVEL controls the ESP-IDF / Arduino-ESP32 system log verbosity.
; It is a compile-time constant; you must re-flash after changing it.
;
;   0 = NONE    – no system messages at all  (production / fastest)
;   1 = ERROR   – only fatal errors
;   2 = WARN    – errors + warnings
;   3 = INFO    – errors + warnings + informational (WiFi, BT, boot)
;   4 = DEBUG   – adds driver-level debug prints
;   5 = VERBOSE – everything; very noisy but most useful for deep debugging
;
; CURRENT SETTING: 5 (VERBOSE) – full debug output enabled.
; Change back to 0 before competition / final deployment to free UART.
;
; In your own code use the standard ESP-IDF log macros:
;   ESP_LOGE(TAG, "format", ...)   ← always shown if level ≥ 1
;   ESP_LOGW(TAG, "format", ...)   ← shown if level ≥ 2
;   ESP_LOGI(TAG, "format", ...)   ← shown if level ≥ 3
;   ESP_LOGD(TAG, "format", ...)   ← shown if level ≥ 4
;   ESP_LOGV(TAG, "format", ...)   ← shown if level ≥ 5
;
; Example in robot.cpp:
;   static const char* TAG = "ROBOT";
;   ESP_LOGD(TAG, "PID error=%.2f correction=%.2f", error, correction);
;
; Serial.printf() calls in the project also go to UART0 at 115200 baud
; and are independent of CORE_DEBUG_LEVEL.
; =========================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial monitor ──────────────────────────────────────────────────────
; Uncomment and set the correct port for your machine:
;   Windows : upload_port = COM3
;   Linux   : upload_port = /dev/ttyUSB0
;   macOS   : upload_port = /dev/cu.usbserial-0001
; upload_port   = COM3
; monitor_port  = COM3
monitor_speed   = 115200
upload_speed    = 921600          ; faster flash writes

; Coloured + timestamped output in the PlatformIO serial monitor
monitor_filters =
    esp32_exception_decoder       ; decodes crash backtraces automatically
    colorize                      ; colour-codes ERROR / WARN / INFO lines
    time                          ; prepends HH:MM:SS.mmm timestamp
    log2file                      ; saves session to .pio/monitor.log

; ── Library dependencies ───────────────────────────────────────────────
; ESP32Servo by Kevin Harrington / madhephaestus
lib_deps =
    madhephaestus/ESP32Servo @ ^0.13.0

; ── Build flags ─────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=5          ; VERBOSE – full ESP32 system + driver logs
    -DDEBUG_ESP_PORT=Serial       ; route ESP-IDF logs to hardware UART0
    -DARDUINO_SERIAL_PORT=0       ; confirm UART0 is the debug port
    -Wall                         ; enable all compiler warnings
    -Wextra                       ; extra warnings (unused vars, etc.)

; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
;
; ENVIRONMENTS
;   esp32dev          – production firmware  (pio run / pio test)
;   test_7ir          – 7-IR line follower firmware  (pio run --environment test_7ir)
;   test_obstacle_debug – obstacle + colour debug sketch
;                         (pio run --environment test_obstacle_debug --target upload)
;
; AUTO-RESET: upload_resetmethod=nodemcu  upload_speed=460800
; DEBUG LOG:  CORE_DEBUG_LEVEL 0=NONE 5=VERBOSE  (set 0 before competition)
; =========================================================================

; ── Shared settings (inherited by all envs) ────────────────────────────────────
[env]
platform              = espressif32
board                 = esp32dev
framework            = arduino
upload_resetmethod    = nodemcu
upload_speed          = 460800
board_build.flash_mode = dio
monitor_speed         = 115200
monitor_filters       =
    esp32_exception_decoder
    colorize
    time
    log2file
lib_deps =
    madhephaestus/ESP32Servo@^0.13.0
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DARDUINO_SERIAL_PORT=0
    -Wall
    -Wextra

; ── ENV 1: Production firmware ────────────────────────────────────────────────
[env:esp32dev]
test_framework = unity
test_filter    = test_unity_smoke

; ── ENV 2: 7-IR line follower firmware ───────────────────────────────────────
[env:test_7ir]
build_src_filter = -<*> +<../test/test_7ir_sketch/>

; ── ENV 3: Obstacle + colour debug firmware ────────────────────────────────
[env:test_obstacle_debug]
build_src_filter = -<*> +<../test/test_obstacle_debug/>

; =========================================================================
; EC6090 Mini-Project – PlatformIO Configuration
; Board     : ESP32 Dev Module (38-pin, WROOM-32)
; Framework : Arduino (Espressif esp32)
;
; FINAL TESTED PIN MAP – see include/config.h for full details
;
; AUTO-RESET / UPLOAD FIX
; ─────────────────────────────────────────────────────────────────────────
; Problem: Board requires pressing EN button before every upload.
; Cause  : Cheap ESP32 clone boards have a weak or missing auto-reset
;          transistor circuit. esptool cannot force GPIO0 LOW before EN
;          rises, so the chip boots in run-mode instead of flash-mode.
;
; Software fixes applied below (no hardware change needed):
;
;   upload_resetmethod = nodemcu
;     Tells esptool to use the NodeMCU RTS/DTR toggle sequence instead of
;     the default "classic" sequence. Works better with CH340 and CP2102
;     USB-UART chips found on most clone boards.
;
;   upload_speed = 460800
;     Reduced from 921600. Slower baud gives the UART chip more time to
;     stabilise the reset lines. Fixes flaky uploads on clone CH340 boards.
;     Increase back to 921600 if your board uploads reliably.
;
;   board_build.flash_mode = dio
;     DIO (dual I/O) is the safest flash mode for WROOM-32 modules.
;     Some clone boards fail with the default QIO mode. DIO is ~5% slower
;     but universally compatible.
;
; If upload STILL fails after these settings, use the hardware fix:
;   Connect a 10 µF electrolytic capacitor between EN pin and GND.
;   Positive lead → EN,  negative lead (stripe) → GND.
;   This replicates the auto-reset RC circuit built into genuine NodeMCU
;   boards and solves the problem permanently.
;
; DEBUG LOGGING GUIDE
; ─────────────────────────────────────────────────────────────────────────
; CORE_DEBUG_LEVEL controls the ESP-IDF / Arduino-ESP32 system log verbosity.
; It is a compile-time constant; you must re-flash after changing it.
;
;   0 = NONE    – no system messages at all  (production / fastest)
;   1 = ERROR   – only fatal errors
;   2 = WARN    – errors + warnings
;   3 = INFO    – errors + warnings + informational (WiFi, BT, boot)
;   4 = DEBUG   – adds driver-level debug prints
;   5 = VERBOSE – everything; very noisy but most useful for deep debugging
;
; CURRENT SETTING: 5 (VERBOSE) – full debug output enabled.
; Change to 0 before competition / final deployment.
;
; In your own code use the standard ESP-IDF log macros:
;   ESP_LOGE(TAG, "format", ...)   ← always shown if level >= 1
;   ESP_LOGW(TAG, "format", ...)   ← shown if level >= 2
;   ESP_LOGI(TAG, "format", ...)   ← shown if level >= 3
;   ESP_LOGD(TAG, "format", ...)   ← shown if level >= 4
;   ESP_LOGV(TAG, "format", ...)   ← shown if level >= 5
;
; Example in robot.cpp:
;   static const char* TAG = "ROBOT";
;   ESP_LOGD(TAG, "PID error=%.2f correction=%.2f", error, correction);
;
; Serial.printf() calls also go to UART0 at 115200 baud and are
; independent of CORE_DEBUG_LEVEL.
; =========================================================================
[env:esp32dev]
platform  = espressif32
board     = esp32dev              ; 38-pin ESP32 Dev Module (WROOM-32)
framework = arduino

; ── Upload / auto-reset fix ─────────────────────────────────────────────
upload_resetmethod    = nodemcu   ; NodeMCU RTS/DTR sequence – fixes clone boards
upload_speed          = 460800    ; reduced from 921600; more stable on CH340 clones
board_build.flash_mode = dio      ; DIO safer than QIO for WROOM-32 clones

; ── Serial monitor ──────────────────────────────────────────────────────
; Uncomment and set the correct port for your machine:
;   Windows : upload_port = COM3
;   Linux   : upload_port = /dev/ttyUSB0
;   macOS   : upload_port = /dev/cu.usbserial-0001
; upload_port   = COM3
; monitor_port  = COM3
monitor_speed   = 115200

; Coloured + timestamped output in the PlatformIO serial monitor
monitor_filters =
    esp32_exception_decoder       ; decodes crash backtraces automatically
    colorize                      ; colour-codes ERROR / WARN / INFO lines
    time                          ; prepends HH:MM:SS.mmm timestamp
    log2file                      ; saves session to .pio/monitor.log

; ── Library dependencies ───────────────────────────────────────────────
; ESP32Servo by Kevin Harrington / madhephaestus
lib_deps =
    madhephaestus/ESP32Servo@^0.13.0

; ── Build flags ─────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=5          ; VERBOSE – full ESP32 system + driver logs
    -DDEBUG_ESP_PORT=Serial       ; route ESP-IDF logs to hardware UART0
    -DARDUINO_SERIAL_PORT=0       ; confirm UART0 is the debug port
    -Wall                         ; enable all compiler warnings
    -Wextra                       ; extra warnings (unused vars, etc.)
